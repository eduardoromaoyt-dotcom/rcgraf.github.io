<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RICGRAF</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #000;
}

/* ANIMAÇÃO */
.fade {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 1s forwards;
}
@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* HEADER */
header {
    background: linear-gradient(90deg, #007bff, #ff00aa);
    color: white;
    text-align: center;
    padding: 60px 20px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    background: #ffd000;
    padding: 15px 30px;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}
.btn:hover {
    transform: scale(1.05);
}

/* SEÇÕES */
.section {
    padding: 50px 20px;
    text-align: center;
}

/* SERVIÇOS */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}
.card {
    padding: 20px;
    border-radius: 10px;
    background: #f5f5f5;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}

/* PORTFÓLIO */
.portfolio img {
    width: 100%;
    border-radius: 10px;
}

/* FOOTER */
.footer {
    background: #000;
    color: white;
    padding: 20px;
    text-align: center;
}

/* RESPONSIVO */
@media(max-width: 600px) {
    header h1 {
        font-size: 24px;
    }
}
</style>

</head>

<body>

<header class="fade">
<h1>RICGRAF</h1>
<p>Impressão profissional que destaca sua marca</p>
<a class="btn" href="https://wa.me/5513991984375">Fale no WhatsApp</a>
</header>

<div class="section fade">
<h2>Serviços</h2>
<div class="services">
<div class="card">Panfletos</div>
<div class="card">Banners</div>
<div class="card">Personalizados</div>
<div class="card">Identidade Visual</div>
</div>
</div>

<div class="section fade">
<h2>Portfólio</h2>
<div class="services portfolio">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</div>

<div class="section fade">
<h2>Peça seu orçamento</h2>
<a class="btn" href="https://wa.me/5513991984375">Chamar no WhatsApp</a>
</div>

<div class="footer">
<p>RICGRAF © 2026</p>
</div>

</body>
</html>
